name: Deploy Blood Bank Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ms-backend:v2 ./backend

      # Push image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-backend:v2

      # Deploy on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/ms-backend:v2

            # Stop old container
            docker stop backend || true

            # Remove old container
            docker rm backend || true

            # Run new container
            docker run -d \
              --name backend \
              --network bloodbank_network \
              --env-file backend.env \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/ms-backend:v2

            # Cleanup unused images
            docker image prune -af


