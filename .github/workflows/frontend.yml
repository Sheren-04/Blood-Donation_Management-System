# .github/workflows/frontend.yml
name: Deploy Blood Bank Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/management-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/management-frontend:${{ github.sha }}

      - name: Deploy to OpenShift
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
          tar -xvf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ secrets.OPENSHIFT_SERVER }} \
            --insecure-skip-tls-verify=true

          oc project sheren04-dev

          oc set image deployment/frontend \
            frontend=${{ secrets.DOCKER_USERNAME }}/management-frontend:${{ github.sha }}

          oc rollout status deployment/frontend

          oc get pods
