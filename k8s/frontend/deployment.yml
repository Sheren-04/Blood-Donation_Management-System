apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sheren04-dev
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1012360000
        allowPrivilegeEscalation: false
      containers:
      - name: frontend
        image: sheren04/bbms-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        volumeMounts:                               # ← inside container
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
      volumes:                                      # ← outside container, inside spec
      - name: nginx-config
        configMap:
          name: nginx-config
