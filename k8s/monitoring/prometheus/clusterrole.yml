# k8s/monitoring/prometheus/clusterrole.yml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: sheren04-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-role
  namespace: sheren04-dev
rules:
- apiGroups: [""]
  resources:
  - pods
  - services
  - endpoints
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-rolebinding
  namespace: sheren04-dev
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: sheren04-dev
roleRef:
  kind: Role
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
